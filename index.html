<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Buddies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Buddy Profile Side -->
        <div class="buddy-profile">
            <!-- Buddy Selector -->
            <div class="buddy-selector">
                <button class="buddy-btn active" data-buddy="chonk" title="Handsome Chonk">🦝</button>
                <button class="buddy-btn" data-buddy="dragon" title="Legendary Dragon">🐉</button>
            </div>
            
            <div class="language-dropdown-wrapper" style="margin-bottom: 20px; width: 80%;">
                <select id="language-select" style="width: 100%; background: rgba(0,0,0,0.4); color: #06b6d4; border: 1px solid rgba(139, 92, 246, 0.4); padding: 8px; border-radius: 12px; font-family: var(--font-ui); font-size: 0.85rem; font-weight: bold; cursor: pointer; outline: none; appearance: auto;">
                    <option value="en">English (US)</option>
                    <option value="ch">Chinese (简体)</option>
                    <option value="ms">Malay (Bahasa)</option>
                </select>
            </div>

            <div class="buddy-image-wrapper">
                <img src="handsome.png" alt="Buddy Image" class="buddy-img" id="buddy-avatar">
                <div class="status-indicator"></div>
            </div>
            <h1 class="buddy-name" id="profile-name">Handsome Chonk</h1>
            <p class="buddy-title" id="profile-title">Majestic Debugging Royalty</p>
            
            <div class="stats-container" id="stats-panel">
                <!-- Injected via JS -->
            </div>

            <!-- Controls Display -->
            <div style="margin-top: auto; width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: center;">
                 <div style="display: flex; gap: 15px; align-items: center;">
                     <label style="color: #06b6d4; font-size: 0.85rem; font-weight: bold; cursor: pointer;">
                        <input type="checkbox" id="voice-toggle" checked style="margin-right: 5px;"> Sound On 🔊
                    </label>
                </div>
                <button id="auto-chat-btn" class="special-btn">
                    Start Auto-Chat ⚔️
                </button>
                <button id="training-btn" class="special-btn" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">
                    Start Training 🎓
                </button>
            </div>
        </div>

        <!-- Chat Console Side -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="header-info">
                    <h2>Live Console</h2>
                    <p id="connection-status">Connected to Chonk.sock...</p>
                    <div id="training-progress-container" style="display: none; width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid rgba(139, 92, 246, 0.2);">
                        <div id="training-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #8b5cf6, #06b6d4); transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);"></div>
                    </div>
                </div>
                <div class="window-controls">
                    <span class="dot close"></span>
                    <span class="dot minimize"></span>
                    <span class="dot maximize"></span>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages will get injected here -->
            </div>

            <div class="chat-input-area">
                <form id="chat-form">
                    <button type="button" id="mic-button" title="Hold to speak (Voice Recognition)">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <input type="text" id="message-input" placeholder="Type a message, or use the mic 🎙️..." autocomplete="off">
                    <button type="submit" id="send-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
